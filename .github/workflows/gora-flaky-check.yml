name: Gora Flaky Check

on:
  workflow_dispatch:

jobs:
  check-flaky-test:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Clone Gora
        run: git clone https://github.com/apache/gora.git

      - name: Checkout target commit
        shell: bash
        run: |
          cd gora
          git checkout 6c6b06c916b969352a6757ba7025cc78055fa87a

      - name: Build target module
        shell: bash
        run: |
          set -o pipefail
          cd gora
          mvn -DskipTests -Dmaven.javadoc.skip=true \
            -pl gora-hive -am test-compile \
            | tee -a ../ci-build.log

      - name: Run test normally
        shell: bash
        run: |
          set -o pipefail
          cd gora
          mvn -pl gora-hive test \
            -DargLine="--add-opens java.base/java.net=ALL-UNNAMED" \
            -Dtest=org.apache.gora.hive.store.TestHiveStore#testResultSizeWithLimit \
            | tee -a ../ci-build.log

      - name: Run test with NonDex
        id: nondex
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          cd gora
          mvn -pl gora-hive \
            edu.illinois:nondex-maven-plugin:2.1.1:nondex \
            -DargLine="--add-opens java.base/java.net=ALL-UNNAMED" \
            -Dtest=org.apache.gora.hive.store.TestHiveStore#testResultSizeWithLimit \
            -DnondexRuns=10 \
            | tee -a ../ci-build.log

      - name: Upload ci-build.log
        uses: actions/upload-artifact@v4
        with:
          name: ci-build-log
          path: ci-build.log

      - name: Fail if NonDex did not produce a failing run
        if: steps.nondex.outcome == 'success'
        run: exit 1
