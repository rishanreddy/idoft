name: jBPM Flaky Check

on:
  workflow_dispatch:

jobs:
  check-flaky-test:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Clone jBPM
        run: git clone https://github.com/kiegroup/jbpm.git

      - name: Build target module
        shell: bash
        run: |
          set -o pipefail
          cd jbpm
          mvn clean install -DskipTests -Dmaven.javadoc.skip=true -Denforcer.skip=true \
            -pl jbpm-case-mgmt/jbpm-case-mgmt-impl -am \
            | tee -a ../ci-build.log

      - name: Run test normally
        shell: bash
        run: |
          set -o pipefail
          cd jbpm
          mvn -pl jbpm-case-mgmt/jbpm-case-mgmt-impl test \
            -Dtest=org.jbpm.casemgmt.impl.CaseServiceImplTest#testAddSubprocessToEmptyCase \
            | tee -a ../ci-build.log

      - name: Run test with NonDex
        id: nondex
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          cd jbpm
          mvn -pl jbpm-case-mgmt/jbpm-case-mgmt-impl \
            edu.illinois:nondex-maven-plugin:2.1.1:nondex \
            -Dtest=org.jbpm.casemgmt.impl.CaseServiceImplTest#testAddSubprocessToEmptyCase \
            -DnondexRuns=20 \
            | tee -a ../ci-build.log

      - name: Upload ci-build.log
        uses: actions/upload-artifact@v4
        with:
          name: ci-build-log
          path: ci-build.log

      - name: Fail if NonDex did not produce a failing run
        if: steps.nondex.outcome == 'success'
        run: exit 1
